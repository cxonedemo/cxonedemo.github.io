html<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 12px; background: #f5f5f5; }
    .card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    h2 { color: #0066cc; margin-top: 0; font-size: 15px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    td { padding: 9px 8px; border-bottom: 1px solid #eee; }
    td:last-child { border-bottom: none; }
    td:first-child { color: #666; font-weight: bold; width: 45%; }
    .badge-yes { background: #d4edda; color: #155724; padding: 3px 10px; border-radius: 12px; font-weight: bold; }
    .badge-no  { background: #f8d7da; color: #721c24; padding: 3px 10px; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h2>&#128100; Caller Information</h2>
    <table>
      <tr><td>Customer Name</td><td id="name"></td></tr>
      <tr><td>Account Number</td><td id="account"></td></tr>
      <tr><td>Authenticated</td><td id="authenticated"></td></tr>
    </table>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    document.getElementById('name').textContent = params.get('name') || 'Unknown';
    document.getElementById('account').textContent = params.get('account') || 'Unknown';

    const auth = params.get('authenticated') || 'No';
    const authEl = document.getElementById('authenticated');
    if (auth.toLowerCase() === 'yes') {
      authEl.innerHTML = '<span class="badge-yes">&#10003; Yes</span>';
    } else {
      authEl.innerHTML = '<span class="badge-no">&#10007; No</span>';
    }
  </script>
</body>
</html>
