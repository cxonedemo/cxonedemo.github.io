<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    .card { background: white; border-radius: 8px; padding: 20px; max-width: 400px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    h2 { color: #0066cc; margin-top: 0; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    td { padding: 10px 8px; border-bottom: 1px solid #eee; }
    td:first-child { color: #666; font-weight: bold; width: 45%; }
    .badge-yes { background: #d4edda; color: #155724; padding: 3px 10px; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h2>&#128100; Caller Information</h2>
    <table>
      <tr><td>Customer Name</td><td>Sarah Mitchell</td></tr>
      <tr><td>Account Number</td><td>ACC-00483921</td></tr>
      <tr><td>Authenticated</td><td><span class="badge-yes">&#10003; Yes</span></td></tr>
      <tr><td>Auth Method</td><td>Voice Biometrics</td></tr>
    </table>
  </div>
</body>
</html>
